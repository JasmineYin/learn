<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学习成长之旅</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #586071;
        --paper: #fffdf8;
        --line: rgba(23, 32, 51, 0.16);
        --accent: #e35235;
        --gold: #e7b546;
        --green: #2f8f73;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui,
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        overflow: hidden;
        position: relative;
      }

      main::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(115deg, rgba(255, 253, 248, 0.88), rgba(255, 253, 248, 0.42)),
          url("data:image/svg+xml,%3Csvg width='1600' height='1000' viewBox='0 0 1600 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1600' height='1000' fill='%23f6efe3'/%3E%3Cg fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M-30 770 C170 650 280 690 435 560 C590 430 690 455 835 315 C975 180 1125 190 1295 90 C1420 18 1515 18 1640 -30' stroke='%23e35235' stroke-width='34' opacity='.72'/%3E%3Cpath d='M-80 860 C165 760 298 780 485 635 C645 510 765 530 955 380 C1125 245 1275 250 1455 135 C1540 80 1600 58 1680 48' stroke='%232f8f73' stroke-width='18' opacity='.66'/%3E%3Cpath d='M-70 555 C160 500 340 530 520 420 C720 298 865 325 1045 210 C1235 88 1380 78 1648 15' stroke='%23e7b546' stroke-width='22' opacity='.68'/%3E%3Cpath d='M50 930 C230 860 390 885 575 760 C725 658 845 662 1005 545 C1190 410 1335 402 1535 275' stroke='%23172033' stroke-width='8' opacity='.24'/%3E%3C/g%3E%3Cg opacity='.52'%3E%3Ccircle cx='270' cy='255' r='72' fill='%23ffffff'/%3E%3Ccircle cx='1220' cy='705' r='118' fill='%23ffffff'/%3E%3Ccircle cx='1435' cy='510' r='38' fill='%23ffffff'/%3E%3C/g%3E%3Cg fill='%23172033' opacity='.22'%3E%3Ccircle cx='360' cy='335' r='5'/%3E%3Ccircle cx='720' cy='700' r='6'/%3E%3Ccircle cx='1080' cy='180' r='5'/%3E%3Ccircle cx='1325' cy='840' r='7'/%3E%3C/g%3E%3C/svg%3E");
        background-size: cover;
        background-position: center;
      }

      .hero {
        width: min(980px, 100%);
        position: relative;
        padding: clamp(28px, 6vw, 72px) 0;
      }

      .mark {
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
        margin-bottom: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.72);
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 48px rgba(23, 32, 51, 0.08);
      }

      .mark span {
        width: 30px;
        height: 30px;
        display: block;
        border: 7px solid var(--accent);
        border-left-color: var(--gold);
        border-bottom-color: var(--green);
        transform: rotate(45deg);
      }

      h1 {
        width: min(860px, 100%);
        margin: 0;
        font-size: clamp(42px, 8vw, 92px);
        line-height: 1.08;
        font-weight: 800;
        letter-spacing: 0;
      }

      p {
        width: min(680px, 100%);
        margin: 28px 0 0;
        color: var(--muted);
        font-size: clamp(18px, 2.5vw, 24px);
        line-height: 1.65;
      }

      .signature {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-top: 42px;
        color: var(--ink);
        font-size: 15px;
        font-weight: 700;
      }

      .signature::before {
        content: "";
        width: 42px;
        height: 2px;
        background: var(--accent);
      }

      @media (max-width: 620px) {
        main {
          place-items: end start;
          padding: 24px;
        }

        .mark {
          width: 54px;
          height: 54px;
          margin-bottom: 22px;
        }

        p {
          margin-top: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="page-title">
        <div class="mark" aria-hidden="true"><span></span></div>
        <h1 id="page-title">这是一场酣畅淋漓的学习成长之旅</h1>
        <p>第一个用 Codex 上传 GitHub 的程序。</p>
        <div class="signature">Hello, GitHub</div>
      </section>
    </main>
  </body>
</html>
